name: 🔄 Auto Sync All Branches (Smart Backup)

on:
  schedule:
    - cron: '0 16,22,4,10 * * *'
  workflow_dispatch: 

jobs:
  sync-incremental:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Logic
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          UPSTREAM_URL="https://github.com/CarbonCommunity/Carbon.git"
          git remote add upstream $UPSTREAM_URL
          git fetch upstream --prune

          for remote_ref in $(git ls-remote --heads upstream | awk '{print $2}'); do
              branch_name=${remote_ref#refs/heads/}
              
              if git rev-parse --verify "origin/$branch_name" >/dev/null 2>&1; then
                  MY_CHANGES=$(git log upstream/$branch_name..origin/$branch_name --oneline -- . ':!.github' 2>/dev/null || echo "")
                  
                  if [ ! -z "$MY_CHANGES" ]; then
                      suffix=1
                      backup_name="${branch_name}${suffix}"
                      while git ls-remote --exit-code --heads origin "$backup_name" > /dev/null; do
                          suffix=$((suffix + 1))
                          backup_name="${branch_name}${suffix}"
                      done
                      git push origin "origin/$branch_name:refs/heads/$backup_name" --force
                  fi
              fi

              git push origin "upstream/$branch_name:refs/heads/$branch_name" --force
          done